<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DelayEngine Remote</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #081017;
      --panel: #101a24;
      --panel-soft: #152331;
      --line: #284054;
      --text: #f3f8ff;
      --muted: #9fb1c4;
      --good: #2dd4bf;
      --warn: #fbbf24;
      --bad: #fb7185;
      --accent: #4fb6ff;
      --button: #203040;
      font-family: Inter, Segoe UI, Arial, sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; color: var(--text);
      background: radial-gradient(circle at 12% -20%, #173044 0, transparent 34%), var(--bg);
    }
    main { width: min(920px, calc(100vw - 16px)); margin: 0 auto; padding: 8px 0; }
    .card {
      border: 1px solid var(--line); border-radius: 10px; padding: 10px;
      background: linear-gradient(180deg, var(--panel), #0d151d);
      box-shadow: 0 16px 38px rgba(0,0,0,.28);
    }
    .remote-layout { display: grid; grid-template-columns: minmax(210px, .75fr) minmax(340px, 1.35fr) minmax(260px, .9fr); gap: 10px; align-items: stretch; }
    .top { display: flex; flex-direction: column; justify-content: space-between; gap: 10px; min-height: 118px; }
    .kicker { color: var(--good); font-size: 12px; font-weight: 850; letter-spacing: .08em; text-transform: uppercase; }
    h1 { margin: 3px 0 0; font-size: 26px; line-height: 1; }
    .pill {
      width: fit-content; min-width: 92px; text-align: center; padding: 7px 10px; border-radius: 999px;
      border: 1px solid var(--line); background: #0c141c; color: var(--muted);
      font-size: 12px; font-weight: 850;
    }
    .pill.good { color: var(--good); border-color: rgba(45,212,191,.5); background: rgba(45,212,191,.08); }
    .pill.warn { color: var(--warn); border-color: rgba(251,191,36,.5); background: rgba(251,191,36,.08); }
    .pill.bad { color: var(--bad); border-color: rgba(251,113,133,.5); background: rgba(251,113,133,.08); }
    .grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 8px; height: 100%; }
    .metric {
      min-height: 118px; padding: 10px; border: 1px solid var(--line); border-radius: 8px;
      background: var(--panel-soft);
      display: grid; align-content: center;
    }
    .label { color: var(--muted); font-size: 12px; margin-bottom: 5px; }
    .value { font-size: 18px; font-weight: 850; overflow-wrap: anywhere; }
    .value.good { color: var(--good); }
    .value.warn { color: var(--warn); }
    .value.bad { color: var(--bad); }
    .right { display: grid; grid-template-rows: 1fr auto; gap: 8px; min-width: 0; }
    .actions { display: grid; grid-template-columns: 1fr; gap: 8px; }
    button {
      width: 100%; min-height: 55px; border: 1px solid var(--line); border-radius: 8px;
      background: var(--button); color: var(--text); font-size: 16px; font-weight: 850;
      cursor: pointer;
    }
    button.primary { background: linear-gradient(180deg, #13a394, #0c7f78); border-color: rgba(45,212,191,.75); }
    button.live { background: #11283a; border-color: rgba(79,182,255,.75); }
    button:disabled { opacity: .48; cursor: not-allowed; filter: grayscale(.35); }
    .note {
      min-height: 46px; padding: 8px 10px; border: 1px solid var(--line);
      border-radius: 8px; background: rgba(6,12,18,.5); color: var(--muted);
      font-size: 13px; line-height: 1.3; white-space: pre-line;
      display: grid; align-content: center;
    }
    .note.good { color: var(--good); border-color: rgba(45,212,191,.35); }
    .note.warn { color: var(--warn); border-color: rgba(251,191,36,.35); }
    .note.bad { color: var(--bad); border-color: rgba(251,113,133,.35); }
    .footer { margin-top: 6px; color: var(--muted); font-size: 11px; text-align: center; }
    @media (max-width: 760px) {
      main { width: min(430px, calc(100vw - 16px)); }
      .remote-layout { grid-template-columns: 1fr; }
      .top { min-height: 0; flex-direction: row; align-items: start; }
      .grid { grid-template-columns: 1fr 1fr; }
      .metric { min-height: 62px; align-content: start; }
      .actions { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main>
    <section class="card">
      <div class="remote-layout">
        <div class="top">
          <div>
            <div class="kicker">Controle remoto</div>
            <h1>DelayEngine</h1>
          </div>
          <div id="statePill" class="pill warn">...</div>
        </div>

        <div class="grid">
          <div class="metric">
            <div class="label">Live</div>
            <div id="liveValue" class="value warn">...</div>
          </div>
          <div class="metric">
            <div class="label">Delay</div>
            <div id="delayValue" class="value warn">...</div>
          </div>
          <div class="metric">
            <div class="label">Loading</div>
            <div id="loadingValue" class="value warn">...</div>
          </div>
          <div class="metric">
            <div class="label">Configurado</div>
            <div id="configuredValue" class="value">...</div>
          </div>
        </div>

        <div class="right">
          <div class="actions">
            <button id="armButton" class="primary" type="button">Adicionar delay</button>
            <button id="offButton" class="live" type="button">Voltar ao vivo</button>
          </div>
          <div id="note" class="note">Aguardando DelayEngine...</div>
        </div>
      </div>
    </section>
    <div class="footer">Use como dock local no OBS/Streamlabs: http://127.0.0.1:8080/remote</div>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    let busy = false;
    let lastStatus = null;

    async function api(path, options = {}) {
      const response = await fetch(path, {
        ...options,
        headers: { 'Content-Type': 'application/json', ...(options.headers || {}) }
      });
      const text = await response.text();
      const data = text ? JSON.parse(text) : {};
      if (!response.ok) throw new Error(data.error || data.message || `HTTP ${response.status}`);
      return data;
    }

    function setNote(text, kind = '') {
      $('note').textContent = text;
      $('note').className = `note ${kind}`;
    }

    function setValue(id, text, kind = '') {
      const el = $(id);
      el.textContent = text;
      el.className = `value ${kind}`;
    }

    function render(data) {
      lastStatus = data;
      const status = data.status || {};
      const inputLive = Boolean(status.input && status.input.connected);
      const outputLive = Boolean(status.output && status.output.connected);
      const delayActive = Boolean(status.delayEnabled || Number(status.delaySeconds || 0) > 0);
      const loadingReady = Boolean(data.activeLoadingExists);
      const loadingConfigured = Boolean(data.activeLoadingConfigured);
      const bufferMode = data.delayArmMode === 'buffer';
      const busyNow = Boolean(data.busy || busy || status.transitionStarted);

      $('statePill').textContent = inputLive && outputLive ? 'Ao vivo' : inputLive ? 'Preparando' : 'Sem live';
      $('statePill').className = `pill ${inputLive && outputLive ? 'good' : inputLive ? 'warn' : 'bad'}`;
      setValue('liveValue', inputLive ? 'Recebida' : 'Aguardando', inputLive ? 'good' : 'warn');
      setValue('delayValue', delayActive ? (status.delay || 'Ativo') : 'OFF', delayActive ? 'good' : 'warn');
      setValue('loadingValue', loadingConfigured ? 'OK' : 'Adicionar', loadingConfigured ? 'good' : 'warn');
      setValue('configuredValue', data.configuredDelay || '30s');

      $('armButton').disabled = busyNow || delayActive || (!bufferMode && !loadingReady);
      $('offButton').disabled = busyNow || !delayActive;

      if (!loadingConfigured && bufferMode) setNote('Corte pelo buffer pronto. Adicione uma imagem ou vídeo no painel para deixar os modos com loading preparados.', 'warn');
      else if (!loadingReady) setNote('Prepare ou ative uma imagem ou vídeo de loading no painel principal.', 'warn');
      else if (busyNow) setNote('Transicao em andamento. Aguarde alguns segundos.', 'warn');
      else if (delayActive) setNote('Delay ativo. Use Voltar ao vivo quando quiser remover.', 'good');
      else setNote('Pronto. Adicionar delay usa o tempo salvo no painel principal.', 'good');
    }

    async function refresh() {
      try {
        render(await api('/control/status'));
      } catch (error) {
        setNote(`Erro: ${error.message}`, 'bad');
      }
    }

    async function run(action, success) {
      if (busy) return;
      busy = true;
      if (lastStatus) render(lastStatus);
      try {
        await action();
        setNote(success, 'good');
      } catch (error) {
        setNote(`Erro: ${error.message}`, 'bad');
      } finally {
        window.setTimeout(() => {
          busy = false;
          refresh();
        }, 600);
      }
    }

    $('armButton').addEventListener('click', () => run(
      () => api('/control/delay/arm', { method: 'POST' }),
      'Comando enviado: adicionando delay.'
    ));
    $('offButton').addEventListener('click', () => run(
      () => api('/control/delay/off', { method: 'POST' }),
      'Comando enviado: voltando ao vivo.'
    ));

    refresh();
    window.setInterval(refresh, 800);
  </script>
</body>
</html>
